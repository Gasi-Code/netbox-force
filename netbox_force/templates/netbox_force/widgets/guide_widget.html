{% if enabled %}
<div class="text-center py-3">
    <i class="mdi mdi-book-open-variant text-primary" style="font-size: 2rem;"></i>
    <p class="mt-2 mb-2 text-muted">Benutzer-Anleitung / User Guide</p>
    <a href="{% url 'plugins:netbox_force:guide' %}" class="btn btn-sm btn-primary">
        <i class="mdi mdi-arrow-right"></i> Guide
    </a>
</div>
{% else %}
<div class="text-center py-3 text-muted">
    <i class="mdi mdi-lock-outline" style="font-size: 2rem;"></i>
    <p class="mt-2 mb-0 small">Guide ist deaktiviert.</p>
</div>
{% endif %}
